name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------
  # Job 1: lint estático con shellcheck
  # ------------------------------------------------------------
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar que shellcheck está disponible
        run: shellcheck --version

      - name: Analizar monitor.sh
        run: shellcheck monitor.sh

  # ------------------------------------------------------------
  # Job 2: smoke test - ejecuta el script una vez para verificar
  # que arranca y termina sin errores. NO usa Telegram (sin secrets).
  # ------------------------------------------------------------
  smoke-test:
    name: Smoke test (MODO=once)
    runs-on: ubuntu-latest
    needs: lint # solo corre si el lint pasó
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Dar permisos de ejecución
        run: chmod +x monitor.sh

      - name: Ejecutar una pasada del monitor
        env:
          MODO: once
          # Apuntamos LOG_BASE al workspace (sin sudo, sin /var/log)
          LOG_BASE: ${{ github.workspace }}/logs/monitor_recursos
          # No pasamos TELEGRAM_* aquí - el script debe funcionar sin Telegram
        run: |
          mkdir -p logs
          ./monitor.sh

      - name: Mostrar log generado
        if: always()
        run: |
          echo "--- Contenido del log ---"
          cat logs/monitor_recursos_*.log || echo "(sin log)"